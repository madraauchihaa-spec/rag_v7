<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navi.AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f8fafc;
            --card-bg: #6366f1;
            --form-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --accent: #059669;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 1.25rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--white);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.025em;
            color: var(--primary);
        }

        main {
            flex: 1;
            padding: 2.5rem 2rem;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        .hero {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .hero h1 {
            font-size: 2.25rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 0.75rem;
        }

        .hero p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .query-card {
            background: var(--form-bg);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 2rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            margin-bottom: 2.5rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-main);
        }

        textarea {
            width: 100%;
            padding: 1rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            color: var(--text-main);
            font-size: 1rem;
            resize: vertical;
            min-height: 120px;
            outline: none;
            transition: all 0.2s;
        }

        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
            background: var(--white);
        }

        .profile-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
        }

        select,
        input[type="text"] {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            color: var(--text-main);
            outline: none;
            transition: all 0.2s;
        }

        select:focus,
        input[type="text"]:focus {
            border-color: var(--primary);
            background: var(--white);
        }

        button {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: var(--white);
            border: none;
            border-radius: 0.75rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 1rem;
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2);
        }

        button:active {
            transform: translateY(0);
        }

        #results {
            margin-top: 1rem;
            display: none;
        }

        .result-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 2.5rem;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.05);
            animation: slideUp 0.4s ease-out;
        }

        .result-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 2rem;
            color: var(--text-main);
            border-bottom: 2px solid var(--bg);
            padding-bottom: 1rem;
        }

        .section-container {
            margin-bottom: 2rem;
        }

        .section-label {
            display: inline-block;
            color: var(--primary);
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.75rem;
            padding: 0.25rem 0.75rem;
            background: rgba(79, 70, 229, 0.08);
            border-radius: 4px;
        }

        .markdown-body {
            font-size: 1rem;
            line-height: 1.7;
            color: var(--text-main);
        }

        .markdown-body p {
            margin-bottom: 1rem;
        }

        .markdown-body ul,
        .markdown-body ol {
            margin-bottom: 1rem;
            padding-left: 1.5rem;
        }

        .markdown-body li {
            margin-bottom: 0.5rem;
        }

        .markdown-body h1,
        .markdown-body h2,
        .markdown-body h3 {
            margin: 1.5rem 0 1rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .markdown-body code {
            background: var(--bg);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-size: 0.9em;
            color: var(--primary);
        }

        .loading {
            display: none;
            text-align: center;
            margin: 3rem 0;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid var(--border);
            border-left-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.25rem;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error {
            color: #b91c1c;
            background: #fef2f2;
            padding: 1rem;
            border-radius: 0.75rem;
            border: 1px solid #fee2e2;
            margin-top: 1.25rem;
            display: none;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <header>
        <div class="logo">Navi.AI</div>
        <div class="status-badge"
            style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.8rem; color: var(--accent); font-weight: 600;">
            <div style="width: 8px; height: 8px; background: var(--accent); border-radius: 50%;"></div>
            System Active
        </div>
    </header>

    <main>
        <div class="hero">
            <h1>Compliance Intelligence</h1>
            <p>Smart legal lookup and audit analysis for safety professionals.</p>
        </div>

        <div class="query-card">
            <div class="form-group">
                <label for="query">Query or Audit Finding</label>
                <textarea id="query" placeholder="Describe the compliance issue or ask a legal question..."></textarea>
            </div>

            <div class="profile-grid">
                <div class="form-group">
                    <label for="industry">Industry</label>
                    <input type="text" id="industry" placeholder="e.g., Engineering" value="None">
                </div>
                <div class="form-group">
                    <label for="mah">MAH Status</label>
                    <select id="mah">
                        <option value="Null">None (N/A)</option>
                        <option value="Non_MAH">Non-MAH</option>
                        <option value="MAH">MAH</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="state">State</label>
                    <input type="text" id="state" placeholder="e.g., Gujarat" value="None">
                </div>
            </div>

            <button id="submitBtn">Analyze Compliance</button>
            <div id="errorMessage" class="error"></div>
        </div>

        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p style="color: var(--text-muted); font-weight: 500;">Navi.AI is analyzing legal frameworks...</p>
        </div>

        <div id="results">
            <!-- Results will be injected here -->
        </div>
    </main>

    <script>
        const submitBtn = document.getElementById('submitBtn');
        const queryInput = document.getElementById('query');
        const industryInput = document.getElementById('industry');
        const mahInput = document.getElementById('mah');
        const stateInput = document.getElementById('state');
        const resultsDiv = document.getElementById('results');
        const loadingDiv = document.getElementById('loading');
        const errorDiv = document.getElementById('errorMessage');

        submitBtn.addEventListener('click', async () => {
            const query = queryInput.value.trim();
            if (!query) return;

            resultsDiv.style.display = 'none';
            resultsDiv.innerHTML = '';
            errorDiv.style.display = 'none';
            loadingDiv.style.display = 'block';

            // Lock inputs and button
            queryInput.disabled = true;
            industryInput.disabled = true;
            mahInput.disabled = true;
            stateInput.disabled = true;
            submitBtn.disabled = true;
            submitBtn.innerText = 'Analyzing...';

            const payload = {
                query: query,
                site_profile: {
                    industry_type: industryInput.value || "Null",
                    mah_status: mahInput.value || "Null",
                    state: stateInput.value || "Null"
                }
            };

            try {
                const response = await fetch('http://127.0.0.1:8005/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error(`API Error: ${response.statusText}`);

                const data = await response.json();
                renderResults(data);
            } catch (err) {
                errorDiv.textContent = `Correction: ${err.message}. Check backend connection.`;
                errorDiv.style.display = 'block';
            } finally {
                loadingDiv.style.display = 'none';

                // Unfreeze inputs and reset button
                queryInput.disabled = false;
                industryInput.disabled = false;
                mahInput.disabled = false;
                stateInput.disabled = false;
                submitBtn.disabled = false;
                submitBtn.innerText = 'Analyze Compliance';
            }

        });

        function renderResults(data) {
            let container = document.createElement('div');
            container.className = 'result-card';

            let title = document.createElement('div');
            title.className = 'result-title';
            title.innerText = 'Compliance Analysis';
            container.appendChild(title);

            // 1. Directly render the main AI Response (markdown) without any label
            if (data.draft_response) {
                const mainResponseEl = document.createElement('div');
                mainResponseEl.className = 'markdown-body';
                mainResponseEl.style.marginBottom = '2rem';
                mainResponseEl.innerHTML = marked.parse(data.draft_response);
                container.appendChild(mainResponseEl);
            }

            // 2. Predefined order for other specific standalone fields if they exist
            const sectionMap = [
                { key: 'answer', label: 'Summary' },
                { key: 'legal_grounding', label: 'Legal Grounding' },
                { key: 'Compliance Gap', label: 'Compliance Gap' },
                { key: 'Risk Exposure', label: 'Risk Exposure' },
                { key: 'Recommended Action', label: 'Recommended Action' },
                { key: 'Evidence Required', label: 'Evidence Required' }
            ];

            sectionMap.forEach(sec => {
                if (data[sec.key] && sec.key !== 'draft_response') {
                    appendSection(container, sec.label, data[sec.key]);
                }
            });

            // 3. Catch any other metadata (Excluding raw acts and internals)
            const internalKeys = [
                'mode_used',
                'detected_topic',
                'legal_matches',
                'sar_matches',
                'draft_response',
                'Legal Applicability' // Explicitly remove raw acts from demo view
            ];

            Object.keys(data).forEach(key => {
                const isInternal = internalKeys.includes(key);
                const isAlreadyShown = sectionMap.some(s => s.key === key);

                if (!isInternal && !isAlreadyShown && typeof data[key] === 'string') {
                    appendSection(container, key.replace(/_/g, ' '), data[key]);
                }
            });



            resultsDiv.innerHTML = '';
            resultsDiv.appendChild(container);
            resultsDiv.style.display = 'block';
            resultsDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function appendSection(parent, label, content) {
            const wrapper = document.createElement('div');
            wrapper.className = 'section-container';

            const labelEl = document.createElement('div');
            labelEl.className = 'section-label';
            labelEl.innerText = label;

            const contentEl = document.createElement('div');
            contentEl.className = 'markdown-body';
            // Render markdown using marked.js
            contentEl.innerHTML = marked.parse(content);

            wrapper.appendChild(labelEl);
            wrapper.appendChild(contentEl);
            parent.appendChild(wrapper);
        }
    </script>
</body>

</html>
